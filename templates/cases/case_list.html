<!DOCTYPE html>
<html>
<head>
    <title>Cases List</title>
    <style>body { font-family: Arial; margin: 40px; }</style>
</head>
<body>
    <h1>All Court Cases</h1>
    <a href="{% url 'dashboard' %}">← Back to Dashboard</a> | 
    <a href="{% url 'add_case' %}">+ Add New Case</a>
    <hr>
    <ul>
        {% for case in cases %}
            <li>
                <strong>{{ case.case_number }}</strong> - {{ case.case_title }} 
                ({{ case.case_status }})
                <a href="{% url 'case_detail' case.pk %}">View</a>
            </li>
        {% empty %}
            <p>No cases yet.</p>
        {% endfor %}
    </ul>
</body>
</html>
