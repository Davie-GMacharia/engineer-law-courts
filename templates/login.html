<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Engineer Law Courts</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'DM Sans',sans-serif; background:#0a1628; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
        .login-wrap { width:100%; max-width:420px; }
        .login-header { text-align:center; margin-bottom:32px; }
        .emblem { width:64px; height:64px; background:#c9a84c; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:28px; margin:0 auto 16px; }
        .login-header h1 { font-family:'Playfair Display',serif; font-size:24px; font-weight:700; color:#ffffff; margin-bottom:6px; }
        .login-header p { font-size:13px; color:rgba(201,168,76,0.7); letter-spacing:1.5px; text-transform:uppercase; }
        .login-card { background:#ffffff; border-radius:16px; padding:36px 32px; }
        .form-group { margin-bottom:18px; }
        .form-label { display:block; font-size:12px; font-weight:500; color:#6b6b8a; letter-spacing:0.5px; text-transform:uppercase; margin-bottom:6px; }
        .form-control { width:100%; padding:11px 14px; border:1px solid #e8e4d8; border-radius:8px; font-size:14px; font-family:'DM Sans',sans-serif; color:#1a1a2e; transition:border-color 0.2s; }
        .form-control:focus { outline:none; border-color:#c9a84c; box-shadow:0 0 0 3px rgba(201,168,76,0.1); }
        .btn-login { width:100%; padding:13px; background:#0a1628; color:#ffffff; border:none; border-radius:8px; font-size:15px; font-weight:500; font-family:'DM Sans',sans-serif; cursor:pointer; margin-top:8px; transition:background 0.2s; }
        .btn-login:hover { background:#132040; }
        .error-msg { background:#fdecea; color:#8b1a1a; border:1px solid #f5c2c2; border-radius:8px; padding:12px 16px; font-size:13px; margin-bottom:18px; }
        .register-link { text-align:center; margin-top:16px; font-size:13px; color:#6b6b8a; }
        .register-link a { color:#c9a84c; text-decoration:none; font-weight:500; }
        .divider { text-align:center; color:#c9a84c; font-size:12px; margin:16px 0 0; letter-spacing:1px; }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="login-header">
        <div class="emblem">⚖</div>
        <h1>Engineer Law Courts</h1>
        <p>Case Management System</p>
    </div>
    <div class="login-card">
        {% if form.errors %}
        <div class="error-msg">Invalid username or password. Please try again.</div>
        {% endif %}
        {% if messages %}
            {% for message in messages %}
            <div class="error-msg">{{ message }}</div>
            {% endfor %}
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Email / Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter your email" autofocus required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-login">Sign In</button>
        </form>
        <div class="register-link">Don't have an account? <a href="{% url 'register' %}">Create one</a></div>
        <div class="divider">⚖ Republic of Kenya Judiciary</div>
    </div>
</div>
</body>
</html>
