{% extends 'base.html' %}
{% block title %}File New Case — Engineer Law Courts{% endblock %}
{% block page_title %}File New Case{% endblock %}

{% block topbar_actions %}
<a href="{% url 'cases_list' %}" class="btn btn-outline">Cancel</a>
{% endblock %}

{% block content %}
<div style="max-width:720px">
    <div class="card">
        <div class="card-header"><span class="card-title">Case Information</span></div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Case Number *</label>
                        <input type="text" name="case_number" class="form-control" placeholder="e.g. ELC/001/2024" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Date Filed *</label>
                        <input type="date" name="date_filed" class="form-control" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Case Title *</label>
                    <input type="text" name="case_title" class="form-control" placeholder="e.g. Republic v. John Doe" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Parties Involved *</label>
                    <textarea name="parties" class="form-control" rows="3" placeholder="List all parties involved..." required></textarea>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Case Status</label>
                        <select name="case_status" class="form-control">
                            <option value="Active">Active</option>
                            <option value="Closed">Closed</option>
                            <option value="Appealed">Appealed</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Assigned To</label>
                        <select name="assigned_to" class="form-control">
                            <option value="">— Select Judge/Officer —</option>
                            {% for user in users %}
                            <option value="{{ user.pk }}">{{ user.get_full_name|default:user.username }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:8px;">
                    <a href="{% url 'cases_list' %}" class="btn btn-outline">Cancel</a>
                    <button type="submit" class="btn btn-gold">File Case</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
